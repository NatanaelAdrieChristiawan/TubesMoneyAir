name: tubesmoneyair
description: A new Flutter project.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  
  sizer: ^2.0.15
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.1.4
  intl: ^0.20.2
  sqflite: ^2.3.0
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.3.10
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/

# Native Splash Screen Configuration
flutter_native_splash:
  color: "#2196F3"
  image: assets/images/wallet.png
  color_dark: "#1976D2"
  image_dark: assets/images/wallet.png
  android_12:
    image: assets/images/wallet.png
    color: "#2196F3"
    image_dark: assets/images/wallet.png
    color_dark: "#1976D2"

# App Icon Configuration
flutter_launcher_icons:
  image_path: assets/images/wallet.png
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#2196F3"
  adaptive_icon_foreground: assets/images/wallet.png
